{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h3>主管頁面密碼驗證</h3>
  <p>請輸入 4 碼主管密碼。</p>
  {% if error %}<p style="color:#b00020;">{{ error }}</p>{% endif %}
  <form method="post" action="/manager/unlock">
    <input type="password" name="pin" maxlength="4" inputmode="numeric" pattern="[0-9]{4}" placeholder="輸入4碼" required autofocus>
    <button type="submit">進入主管頁</button>
  </form>
</div>
<script>
  (function () {
    const asked = sessionStorage.getItem('manager-pin-asked');
    if (asked) return;
    sessionStorage.setItem('manager-pin-asked', '1');
    const pin = window.prompt('請輸入主管密碼（4碼）');
    if (!pin) return;
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = '/manager/unlock';
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'pin';
    input.value = pin;
    form.appendChild(input);
    document.body.appendChild(form);
    form.submit();
  })();
</script>
{% endblock %}
